<!DOCTYPE html>
<html>
  <head>
    <title>Home</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:
wght@700&family=Poppins:wght@100;200;300;400;500;600&family=Ubuntu:wght@700&
display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body class="profile-body">
    <div id="navbar-container"></div>
    <div id="notification-container"></div>
    <div id="settings-container"></div> 
    <div id="add-container"></div>
    <div class="home-container-0"></div>
    <div class="profile-section">
      <div class="profile-container">
        <div class="profile-box">
          <img
            src="assets/profile/pfp-3.jpg"
            alt="profile-image"
            class="profile-img"
          />
          <div class="img-edit">
            <div class="pfp-icon-container">
              <a href="#" class="pfp-icon"
                ><img
                  src="assets/icons/pencil.png"
                  alt="Edit Profile Picture"
                  class="pfp-icon"
              /></a>
              <a href="#" class="pfp-icon"
                ><img
                  src="assets/icons/eye.png"
                  alt="Edit Profile Picture"
                  class="pfp-icon"
              /></a>
            </div>
          </div>
        </div>
        <h2 class="profile-name-text">Zauraiz Ahmad</h2>
        <div class="profile-bio">
          <p>Dreamer. Learner. Doer. Open to new experiences and challenges.</p>
        </div>
        <div class="count-bar">
          <div class="count-div">
            <p class="count-text">Followers</p>
            <span>98</span>
          </div>
          <div class="count-div">
            <p class="count-text">Following</p>
            <span>148</span>
          </div>
          <div class="count-div">
            <p class="count-text">Posts</p>
            <span>53</span>
          </div>
        </div>
        <div class="profile-button-container">
          <a href="#" class="profile-button">Edit Profile</a>
          <a href="#" class="profile-button">Add to Deck</a>
        </div>
      </div>
      <div class="deck-container">
        <div class="profile-deck-container">
        <img src="assets/decks/deck-4.jpg" alt="deck 1" class="profile-deck-img deck-img-1" />
        <img src="assets/decks/deck-4.jpg" alt="deck 1" class="profile-deck-img deck-img-2" />
        <img src="assets/decks/deck-4.jpg" alt="deck 1" class="profile-deck-img deck-img-3" />
        <img src="assets/decks/deck-4.jpg" alt="deck 1" class="profile-deck-img deck-img-4" />
        <img src="assets/decks/deck-4.jpg" alt="deck 1" class="profile-deck-img deck-img-5" />
        </div>
      </div>
      <div class="profile-gallery-container">
        <h1 class="your-deck-heading">Your Deck</h1>
      <div class="profile-img-container">
            <div class="explore-img-box">
              <img
                src="/assets/posts/post-1.jpg"
                alt="image"
                class="explore-img"
              />
            </div>
            <div class="explore-img-box">
              <img
                src="/assets/posts/post-3.jpg"
                alt="image"
                class="explore-img"
              />
            </div>
            <div class="explore-img-box">
              <img
                src="/assets/posts/post-2.jpg"
                alt="image"
                class="explore-img"
              />
            </div>
            <div class="explore-img-box">
              <img
                src="/assets/posts/post-6.jpg"
                alt="image"
                class="explore-img"
              />
            </div>
            <div class="explore-img-box">
              <img
                src="/assets/posts/post-7.jpg"
                alt="image"
                class="explore-img"
              />
            </div>
            <div class="explore-img-box">
              <img
                src="/assets/posts/post-9.jpg"
                alt="image"
                class="explore-img"
              />
            </div>
            <div class="explore-img-box">
              <img
                src="/assets/posts/post-4.jpg"
                alt="image"
                class="explore-img"
              />
            </div>
            <div class="explore-img-box">
              <img
                src="/assets/posts/post-5.jpg"
                alt="image"
                class="explore-img"
              />
            </div>
            <div class="explore-img-box">
              <img
                src="/assets/posts/post-8.jpg"
                alt="image"
                class="explore-img"
              />
            </div>
        </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
