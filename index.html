<!-- index.html -->
<!DOCTYPE html>
<html>
  <head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Condensed:
wght@700&family=Poppins:wght@100;200;300;400;500;600&family=Ubuntu:wght@700&
display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="login-container">
      <div class="phone-img-box">
        <img src="./assets/phone_login.png" alt="Phone" class="login-img" />
      </div>
      <div class="login-box">
        <img
          class="login-logo"
          src="./assets/logo/logo_text_light.png"
          alt="Seen Logo"
        />
        <form id="login-Id" class="login-form" onsubmit="return loginUser()">
          <input
            class="login-text"
            type="text"
            placeholder="Username"
            required
          />
          <input
            class="login-text"
            type="password"
            placeholder="Password"
            required
          />
          <button class="login-text">Login</button>
          <a href="" class="links">Forgot Password?</a>
        </form>
        <p id="login">
          Haven't signed up yet?
          <a onclick="showSignup()" href="#" class="links"> Sign Up Here!</a>
        </p>

        <form id="signup-Id" class="login-form" onsubmit="return loginUser()">
          <input
            class="login-text"
            type="text"
            placeholder="Full Name"
            required
          />
          <input class="login-text" type="text" placeholder="Email" required />
          <input
            class="login-text"
            type="password"
            placeholder="Username"
            required
          />
          <input
            class="login-text"
            type="password"
            placeholder="Password"
            required
          />
          <button onclick="showlogin()" class="login-text" type="submit">
            Sign Up
          </button>
        </form>
        <p id="signup" style="margin-top: -4rem">
          Already have an account?
          <a onclick="showlogin()" href="#" class="links"> Login Here!</a>
        </p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
